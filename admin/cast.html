<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャスト管理</title>

<link rel="stylesheet" href="../assets/css/admin.css?v=5.6.1">

</head>

<body>

<div class="admin-layout">

<div class="sidebar">

<h2>CHOU CHOU</h2>

<a href="dashboard.html">ダッシュボード</a>
<a href="cast.html">キャスト管理</a>
<a href="schedule.html">出勤管理</a>
<a href="news.html">お知らせ</a>
<a href="gallery.html">ギャラリー</a>

</div>

<div class="main">

<h1>キャスト管理</h1>

<button class="add-btn" id="openForm">
    ＋ キャスト追加
</button>

<div class="cast-grid" id="castGrid">

</div>

<div id="castForm" class="popup">

   <div class="popup-content">

    <button id="closeX" class="close-x">
    ×
</button>

    <h2>キャスト追加</h2>

    <input
        type="text"
        id="castName"
        placeholder="名前"
    >

    <input
        type="number"
        id="castAge"
        placeholder="年齢"
    >

    <input
  type="text"
  id="cast-height"
  placeholder="身長（例:160cm）"
>

<input
  type="text"
  id="cast-birthday"
  placeholder="誕生日（例: 3月14日）"
>

<input
  type="text"
  id="cast-blood-type"
  placeholder="血液型"
>

<input
  type="text"
  id="cast-hobby"
  placeholder="趣味"
>

<input
  type="text"
  id="cast-drink"
  placeholder="好きなお酒"
>

<textarea
  id="cast-message"
  placeholder="メッセージ"
></textarea>

<input
  type="text"
  id="cast-instagram"
  placeholder="Instagram URL"
>

<input
  type="text"
  id="cast-x"
  placeholder="X URL"
>

<input
  type="text"
  id="cast-tiktok"
  placeholder="TikTok URL"
>

<input
  type="text"
  id="cast-tags"
  placeholder="タグ（カンマ区切り）"
>

<div id="castTagOptions" class="tag-options" aria-label="タグ選択"></div>

<div class="cast-badge-options" aria-label="表示バッジ設定">
  <p class="cast-badge-options-title">バッジ設定</p>

  <label class="cast-badge-toggle">
    <span class="badge-preview badge-preview-new" aria-label="NEW 新人">
      <svg class="premium-cast-badge-svg premium-cast-badge-svg-new" viewBox="0 0 64 78" role="img" aria-hidden="true" focusable="false">
        <defs>
          <linearGradient id="formNewBadgeFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffb8dc"/>
            <stop offset="40%" stop-color="#ff4fad"/>
            <stop offset="72%" stop-color="#df0f86"/>
            <stop offset="100%" stop-color="#990657"/>
          </linearGradient>
          <linearGradient id="formNewBadgeShine" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff" stop-opacity=".72"/>
            <stop offset="48%" stop-color="#fff" stop-opacity=".18"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
          </linearGradient>
          <filter id="formNewBadgeShadow" x="-25%" y="-20%" width="150%" height="150%">
            <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#5e1438" flood-opacity=".32"/>
          </filter>
        </defs>
        <path d="M12 5H52Q57 5 57 10V61L43 61L32 74L21 61H7V10Q7 5 12 5Z" fill="url(#formNewBadgeFill)" stroke="#ffe9a9" stroke-width="3" filter="url(#formNewBadgeShadow)"/>
        <path d="M13 9H51Q53 9 53 11V17Q34 8 11 28V11Q11 9 13 9Z" fill="url(#formNewBadgeShine)"/>
        <path d="M13 5H51Q57 5 57 11V22H7V11Q7 5 13 5Z" fill="#ffffff" opacity=".08"/>
        <text x="32" y="30" text-anchor="middle" fill="#fff" font-size="16" font-weight="900" font-family="Arial, sans-serif" letter-spacing=".8">NEW</text>
        <text x="32" y="50" text-anchor="middle" fill="#fff" font-size="14" font-weight="900" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">新人</text>
      </svg>
    </span>
    <input type="checkbox" id="cast-is-new">
    <span>新人として表示する</span>
  </label>

  <label class="cast-badge-toggle">
    <span class="badge-preview badge-preview-recommended" aria-label="おすすめ">
      <svg class="premium-cast-badge-svg premium-cast-badge-svg-recommended" viewBox="0 0 74 58" role="img" aria-hidden="true" focusable="false">
        <defs>
          <linearGradient id="formRecommendedBadgeFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff4b6"/>
            <stop offset="34%" stop-color="#f4c948"/>
            <stop offset="70%" stop-color="#c78612"/>
            <stop offset="100%" stop-color="#7a4b05"/>
          </linearGradient>
          <radialGradient id="formRecommendedBadgeGlow" cx=".32" cy=".18" r=".72">
            <stop offset="0%" stop-color="#fff" stop-opacity=".78"/>
            <stop offset="45%" stop-color="#fff" stop-opacity=".16"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
          </radialGradient>
          <filter id="formRecommendedBadgeShadow" x="-25%" y="-25%" width="150%" height="150%">
            <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#573500" flood-opacity=".34"/>
          </filter>
        </defs>
        <path d="M37 4C41 10 48 7 52 13C59 13 62 19 59 25C66 29 64 37 57 39C57 47 50 51 43 48C39 55 31 55 27 48C20 51 13 47 13 39C6 37 8 29 15 25C12 19 15 13 22 13C26 7 33 10 37 4Z" fill="url(#formRecommendedBadgeFill)" stroke="#8d5c08" stroke-width="3" filter="url(#formRecommendedBadgeShadow)"/>
        <path d="M22 15C31 8 45 9 53 17C44 14 28 17 16 29C15 24 17 19 22 15Z" fill="url(#formRecommendedBadgeGlow)"/>
        <path d="M20 18C28 12 46 12 54 22" fill="none" stroke="#fff7c8" stroke-width="2" stroke-linecap="round" opacity=".55"/>
        <text x="37" y="35" text-anchor="middle" fill="#fff" font-size="13" font-weight="900" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" paint-order="stroke" stroke="#8b5705" stroke-width="2" stroke-linejoin="round">おすすめ</text>
      </svg>
    </span>
    <input type="checkbox" id="cast-is-recommended">
    <span>おすすめキャストとして表示する</span>
  </label>
</div>

    <label>写真</label>

    <label>写真①</label>
<input type="file" id="castImage1" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage1"></div>

<label>写真②</label>
<input type="file" id="castImage2" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage2"></div>

<label>写真③</label>
<input type="file" id="castImage3" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage3"></div>

<label>写真④</label>
<input type="file" id="castImage4" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage4"></div>

<label>写真⑤</label>
<input type="file" id="castImage5" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage5"></div>

<div class="form-buttons">

    <button id="closeForm">
        キャンセル
    </button>

    <button id="saveCast">
        保存
    </button>

</div>

    </div>

</div>
<script type="module" src="../assets/js/firebase.js"></script>
<script type="module" src="../assets/app.js"></script>
<script src="../assets/cast-manager.js"></script>

</body>
</html>
