<select id="cast-blood-type" class="cast-profile-select" aria-label="血液型">
  <option value="">血液型 未入力</option>
  <option value="A型">A型</option>
  <option value="B型">B型</option>
  <option value="O型">O型</option>
  <option value="AB型">AB型</option>
</select>

<input
  type="text"
  id="cast-hobby"
  placeholder="趣味"
>

<input
  type="text"
  id="cast-drink"
  placeholder="好きなお酒"
>

<textarea
  id="cast-message"
  placeholder="メッセージ"
></textarea>

<input
  type="text"
  id="cast-instagram"
  placeholder="Instagram URL"
>

<input
  type="text"
  id="cast-x"
  placeholder="X URL"
>

  type="text"
  id="cast-tiktok"

>

<input
  type="text"
  id="cast-tags"
  placeholder="タグ（カンマ区切り）"
>

<div id="castTagOptions" class="tag-options" aria-label="タグ選択"></div>

<div class="cast-badge-options" aria-label="表示バッジ設定">
  <p class="cast-badge-options-title">バッジ設定</p>

  <label class="cast-badge-toggle">
    <span class="badge-preview badge-preview-new" aria-label="NEW 新人">

    </span>
    <input type="checkbox" id="cast-is-new">
    <span>新人として表示する</span>
  </label>

  <label class="cast-badge-toggle">
    <span class="badge-preview badge-preview-recommended" aria-label="おすすめ">
      <img class="premium-cast-badge-img premium-cast-badge-img-recommended" src="../assets/img/badges/badge-osusume.png" alt="おすすめ" loading="lazy" decoding="async" onerror="this.parentElement.remove()">
    </span>
    <input type="checkbox" id="cast-is-recommended">
    <span>おすすめキャストとして表示する</span>
  </label>

    <label>写真</label>

    <label>写真①</label>
