<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャスト管理</title>

<link rel="stylesheet" href="../assets/css/admin.css?v=5.6.1">

</head>

<body>

<div class="admin-layout">

<div class="sidebar">

<h2>CHOU CHOU</h2>

<a href="dashboard.html">ダッシュボード</a>
<a href="cast.html">キャスト管理</a>
<a href="schedule.html">出勤管理</a>
<a href="news.html">お知らせ</a>
<a href="gallery.html">ギャラリー</a>

</div>

<div class="main">

<h1>キャスト管理</h1>

<button class="add-btn" id="openForm">
    ＋ キャスト追加
</button>

<div class="cast-grid" id="castGrid">

</div>

<div id="castForm" class="popup">

   <div class="popup-content">

    <button id="closeX" class="close-x">
    ×
</button>

    <h2>キャスト追加</h2>

    <input
        type="text"
        id="castName"
        placeholder="名前"
    >

    <input
        type="number"
        id="castAge"
        placeholder="年齢"
    >

    <input
  type="text"
  id="cast-height"
  placeholder="身長（例:160cm）"
>

<input
  type="text"
  id="cast-birthday"
  placeholder="誕生日（例: 3月14日）"
>

<input
  type="text"
  id="cast-blood-type"
  placeholder="血液型"
>

<input
  type="text"
  id="cast-hobby"
  placeholder="趣味"
>

<input
  type="text"
  id="cast-drink"
  placeholder="好きなお酒"
>

<textarea
  id="cast-message"
  placeholder="メッセージ"
></textarea>

<input
  type="text"
  id="cast-instagram"
  placeholder="Instagram URL"
>

<input
  type="text"
  id="cast-x"
  placeholder="X URL"
>

<input
  type="text"
  id="cast-tiktok"
  placeholder="TikTok URL"
>

<input
  type="text"
  id="cast-tags"
  placeholder="タグ（カンマ区切り）"
>

<div id="castTagOptions" class="tag-options" aria-label="タグ選択"></div>

<div class="cast-badge-options" aria-label="表示バッジ設定">
  <p class="cast-badge-options-title">バッジ設定</p>

  <label class="cast-badge-toggle">
    <span class="badge-preview badge-preview-new" aria-label="NEW 新人">
      <svg class="premium-cast-badge-svg premium-cast-badge-svg-new" viewBox="0 0 70 82" role="img" aria-hidden="true" focusable="false">
        <defs>
          <linearGradient id="formNewBadgeFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffc6e6"/>
            <stop offset="30%" stop-color="#ff6fbd"/>
            <stop offset="68%" stop-color="#d90b7f"/>
            <stop offset="100%" stop-color="#850548"/>
          </linearGradient>
          <linearGradient id="formNewBadgeGloss" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff" stop-opacity=".88"/>
            <stop offset="42%" stop-color="#fff" stop-opacity=".2"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
          </linearGradient>
          <filter id="formNewBadgeShadow" x="-25%" y="-20%" width="150%" height="150%">
            <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#4f1231" flood-opacity=".34"/>
          </filter>
        </defs>
        <path d="M14 2H56Q65 2 65 11V63L51 63L35 80L19 63H5V11Q5 2 14 2Z" fill="#fffdf8" filter="url(#formNewBadgeShadow)"/>
        <path d="M16 5H54Q62 5 62 13V60L49 60L35 76L21 60H8V13Q8 5 16 5Z" fill="url(#formNewBadgeFill)" stroke="#d8ad46" stroke-width="2.2"/>
        <path d="M18 8H52Q58 8 58 14V25Q42 16 12 31V14Q12 8 18 8Z" fill="url(#formNewBadgeGloss)"/>
        <path d="M14 13Q35 4 56 13" fill="none" stroke="#fff8d8" stroke-width="1.5" stroke-linecap="round" opacity=".75"/>
        <path d="M13 58H24L35 71L46 58H57" fill="none" stroke="#6e053d" stroke-width="2" opacity=".18"/>
        <text x="35" y="32" text-anchor="middle" fill="#fff" font-size="17" font-weight="900" font-family="Arial, sans-serif" letter-spacing="1" paint-order="stroke" stroke="#8e0a55" stroke-width="1.6" stroke-linejoin="round">NEW</text>
        <text x="35" y="53" text-anchor="middle" fill="#fff" font-size="15" font-weight="900" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" paint-order="stroke" stroke="#8e0a55" stroke-width="1.4" stroke-linejoin="round">新人</text>
      </svg>
    </span>
    <input type="checkbox" id="cast-is-new">
    <span>新人として表示する</span>
  </label>

  <label class="cast-badge-toggle">
    <span class="badge-preview badge-preview-recommended" aria-label="おすすめ">
      <svg class="premium-cast-badge-svg premium-cast-badge-svg-recommended" viewBox="0 0 80 52" role="img" aria-hidden="true" focusable="false">
        <defs>
          <linearGradient id="formRecommendedBadgeFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff5bd"/>
            <stop offset="32%" stop-color="#f2c64c"/>
            <stop offset="68%" stop-color="#bd7a0b"/>
            <stop offset="100%" stop-color="#6f4302"/>
          </linearGradient>
          <radialGradient id="formRecommendedBadgeGlow" cx=".32" cy=".18" r=".72">
            <stop offset="0%" stop-color="#fff" stop-opacity=".86"/>
            <stop offset="42%" stop-color="#fff" stop-opacity=".18"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
          </radialGradient>
          <filter id="formRecommendedBadgeShadow" x="-25%" y="-25%" width="150%" height="150%">
            <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#4f3100" flood-opacity=".32"/>
          </filter>
        </defs>
        <path d="M9 14Q20 4 40 5Q60 4 71 14L77 26L71 38Q60 48 40 47Q20 48 9 38L3 26Z" fill="#fffdf5" filter="url(#formRecommendedBadgeShadow)"/>
        <path d="M12 15Q22 8 40 8Q58 8 68 15L73 26L68 37Q58 44 40 44Q22 44 12 37L7 26Z" fill="url(#formRecommendedBadgeFill)" stroke="#8d5c08" stroke-width="2.2"/>
        <path d="M15 16Q28 9 51 11Q63 13 68 21Q43 13 12 29Q10 21 15 16Z" fill="url(#formRecommendedBadgeGlow)"/>
        <path d="M13 34Q40 43 67 34" fill="none" stroke="#6b4101" stroke-width="3" opacity=".22"/>
        <path d="M16 18Q40 8 64 18" fill="none" stroke="#fff8d1" stroke-width="1.7" stroke-linecap="round" opacity=".72"/>
        <text x="40" y="32" text-anchor="middle" fill="#fff" font-size="14" font-weight="900" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" paint-order="stroke" stroke="#765005" stroke-width="2.2" stroke-linejoin="round">おすすめ</text>
      </svg>
    </span>
    <input type="checkbox" id="cast-is-recommended">
    <span>おすすめキャストとして表示する</span>
  </label>
</div>

    <label>写真</label>

    <label>写真①</label>
<input type="file" id="castImage1" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage1"></div>

<label>写真②</label>
<input type="file" id="castImage2" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage2"></div>

<label>写真③</label>
<input type="file" id="castImage3" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage3"></div>

<label>写真④</label>
<input type="file" id="castImage4" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage4"></div>

<label>写真⑤</label>
<input type="file" id="castImage5" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage5"></div>

<div class="form-buttons">

    <button id="closeForm">
        キャンセル
    </button>

    <button id="saveCast">
        保存
    </button>

</div>

    </div>

</div>
<script type="module" src="../assets/js/firebase.js"></script>
<script type="module" src="../assets/app.js"></script>
<script src="../assets/cast-manager.js"></script>

</body>
</html>
