<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャスト管理</title>

<link rel="stylesheet" href="../assets/css/admin.css?v=5.6.1">

</head>

<body>

<div class="admin-layout">

<div class="sidebar">

<h2>CHOU CHOU</h2>

<a href="dashboard.html">ダッシュボード</a>
<a href="cast.html">キャスト管理</a>
<a href="schedule.html">出勤管理</a>
<a href="news.html">お知らせ</a>
<a href="gallery.html">ギャラリー</a>

</div>

<div class="main">

<h1>キャスト管理</h1>

<button class="add-btn" id="openForm">
    ＋ キャスト追加
</button>

<div class="cast-grid" id="castGrid">

</div>

<div id="castForm" class="popup">

   <div class="popup-content">

    <button id="closeX" class="close-x">
    ×
</button>

    <h2>キャスト追加</h2>

    <input
        type="text"
        id="castName"
        placeholder="名前"
    >

    <input
        type="number"
        id="castAge"
        placeholder="年齢"
    >

    <input
  type="text"
  id="cast-height"
  placeholder="身長（例:160cm）"
>

<input
  type="text"
  id="cast-birthday"
  placeholder="誕生日（例: 3月14日）"
>

<input
  type="text"
  id="cast-blood-type"
  placeholder="血液型"
>

<input
  type="text"
  id="cast-hobby"
  placeholder="趣味"
>

<input
  type="text"
  id="cast-drink"
  placeholder="好きなお酒"
>

<textarea
  id="cast-message"
  placeholder="メッセージ"
></textarea>

<input
  type="text"
  id="cast-instagram"
  placeholder="Instagram URL"
>

<input
  type="text"
  id="cast-x"
  placeholder="X URL"
>

<input
  type="text"
  id="cast-tiktok"
  placeholder="TikTok URL"
>

<input
  type="text"
  id="cast-tags"
  placeholder="タグ（カンマ区切り）"
>

<div id="castTagOptions" class="tag-options" aria-label="タグ選択"></div>

<div class="cast-badge-options" aria-label="表示バッジ設定">
  <p class="cast-badge-options-title">バッジ設定</p>

  <label class="cast-badge-toggle">
    <span class="badge-preview badge-preview-new" aria-label="NEW 新人">
      <svg class="premium-cast-badge-svg premium-cast-badge-svg-new" viewBox="0 0 70 82" role="img" aria-hidden="true" focusable="false">
        <defs>
          <linearGradient id="formNewBadgeFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffe0f1"/>
            <stop offset="30%" stop-color="#f6a3cb"/>
            <stop offset="68%" stop-color="#d85c9e"/>
            <stop offset="100%" stop-color="#a63472"/>
          </linearGradient>
          <linearGradient id="formNewBadgeGloss" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff" stop-opacity=".88"/>
            <stop offset="42%" stop-color="#fff" stop-opacity=".2"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
          </linearGradient>
          <filter id="formNewBadgeShadow" x="-25%" y="-20%" width="150%" height="150%">
            <feDropShadow dx="0" dy="4" stdDeviation="2.2" flood-color="#5a2441" flood-opacity=".2"/>
          </filter>
        </defs>
        <path d="M17 3H53Q60 3 60 11V62H48L35 78L22 62H10V11Q10 3 17 3Z" fill="#fffefd" filter="url(#formNewBadgeShadow)"/>
        <path d="M18 7H52Q57 7 57 13V59H46L35 73L24 59H13V13Q13 7 18 7Z" fill="url(#formNewBadgeFill)" stroke="#d7bb74" stroke-width="1.35"/>
        <path d="M18 9H52Q56 9 56 14V23Q39 16 14 29V14Q14 9 18 9Z" fill="url(#formNewBadgeGloss)"/>
        <path d="M18 13Q35 7 52 13" fill="none" stroke="#fff8d8" stroke-width="1.5" stroke-linecap="round" opacity=".75"/>
    <path d="M35 16L36.5 19.2L40 20L36.8 21.5L35 25L33.2 21.5L30 20L33.5 19.2Z" fill="#fff8d8" opacity=".72"/>
        <path d="M17 57H25L35 69L45 57H53" fill="none" stroke="#6e053d" stroke-width="1.2" opacity=".1"/>
        <text x="35" y="32" text-anchor="middle" fill="#fff" font-size="17" font-weight="900" font-family="Arial, sans-serif" letter-spacing="1" paint-order="stroke" stroke="#9f4f7e" stroke-width=".45" stroke-linejoin="round">NEW</text>
        <text x="35" y="53" text-anchor="middle" fill="#fff" font-size="15" font-weight="900" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" paint-order="stroke" stroke="#9f4f7e" stroke-width=".35" stroke-linejoin="round">新人</text>
      </svg>
    </span>
    <input type="checkbox" id="cast-is-new">
    <span>新人として表示する</span>
  </label>

  <label class="cast-badge-toggle">
    <span class="badge-preview badge-preview-recommended" aria-label="おすすめ">
      <svg class="premium-cast-badge-svg premium-cast-badge-svg-recommended" viewBox="0 0 80 52" role="img" aria-hidden="true" focusable="false">
        <defs>
          <linearGradient id="formRecommendedBadgeFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff9dd"/>
            <stop offset="32%" stop-color="#ecd38a"/>
            <stop offset="68%" stop-color="#c69b45"/>
            <stop offset="100%" stop-color="#85621f"/>
          </linearGradient>
          <radialGradient id="formRecommendedBadgeGlow" cx=".32" cy=".18" r=".72">
            <stop offset="0%" stop-color="#fff" stop-opacity=".72"/>
            <stop offset="42%" stop-color="#fff" stop-opacity=".14"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
          </radialGradient>
          <filter id="formRecommendedBadgeShadow" x="-25%" y="-25%" width="150%" height="150%">
            <feDropShadow dx="0" dy="4" stdDeviation="2.2" flood-color="#5b4215" flood-opacity=".18"/>
          </filter>
        </defs>
        <path d="M9 16Q21 8 40 8Q59 8 71 16Q76 21 77 26Q76 31 71 36Q59 44 40 44Q21 44 9 36Q4 31 3 26Q4 21 9 16Z" fill="#fffef8" filter="url(#formRecommendedBadgeShadow)"/>
        <path d="M12 17Q23 11 40 11Q57 11 68 17Q72 21 73 26Q72 31 68 35Q57 41 40 41Q23 41 12 35Q8 31 7 26Q8 21 12 17Z" fill="url(#formRecommendedBadgeFill)" stroke="#a77d2e" stroke-width="1.35"/>
        <path d="M16 17Q29 11 50 13Q62 14 68 21Q45 15 12 28Q11 21 16 17Z" fill="url(#formRecommendedBadgeGlow)"/>
        <path d="M15 34Q40 40 65 34" fill="none" stroke="#6b4101" stroke-width="2" opacity=".12"/>
        <path d="M17 19Q40 12 63 19" fill="none" stroke="#fff8d1" stroke-width="1.7" stroke-linecap="round" opacity=".72"/>
        <text x="40" y="32" text-anchor="middle" fill="#fff" font-size="14" font-weight="900" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" paint-order="stroke" stroke="#96733a" stroke-width=".65" stroke-linejoin="round">おすすめ</text>
      </svg>
    </span>
    <input type="checkbox" id="cast-is-recommended">
    <span>おすすめキャストとして表示する</span>
  </label>
</div>

    <label>写真</label>

    <label>写真①</label>
<input type="file" id="castImage1" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage1"></div>

<label>写真②</label>
<input type="file" id="castImage2" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage2"></div>

<label>写真③</label>
<input type="file" id="castImage3" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage3"></div>

<label>写真④</label>
<input type="file" id="castImage4" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage4"></div>

<label>写真⑤</label>
<input type="file" id="castImage5" accept="image/*">
<div class="image-slot-preview" data-preview-for="castImage5"></div>

<div class="form-buttons">

    <button id="closeForm">
        キャンセル
    </button>

    <button id="saveCast">
        保存
    </button>

</div>

    </div>

</div>
<script type="module" src="../assets/js/firebase.js"></script>
<script type="module" src="../assets/app.js"></script>
<script src="../assets/cast-manager.js"></script>

</body>
</html>
