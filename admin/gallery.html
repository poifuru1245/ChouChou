<h1>ギャラリー管理</h1>

<div class="gallery-admin-panel">

  <div class="gallery-upload-form">
    <input type="text" id="galleryTitle" placeholder="タイトル（任意）">
    <input type="file" id="galleryImages" accept="image/*" multiple>
    <button type="button" class="add-btn" id="uploadGallery">
      画像アップロード
    </button>
  </div>

  <p id="galleryMessage" class="gallery-admin-message"></p>

</div>

<div class="order-controls gallery-order-controls">
  <button type="button" id="saveGalleryOrder" class="order-save-btn" disabled>
    並び順を保存
  </button>
  <span id="galleryOrderStatus" class="order-status"></span>
</div>

<div class="gallery-admin-grid" id="galleryGrid">

</div>
