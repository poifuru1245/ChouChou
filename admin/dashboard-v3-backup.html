<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHOU CHOU 管理画面</title>

<link rel="stylesheet" href="../assets/css/admin.css">

</head>

<body>

<div class="admin-layout">

    <div class="sidebar">
    <h2>CHOU CHOU</h2>

    <a href="dashboard.html">ダッシュボード</a>
    <a href="cast.html">キャスト管理</a>
    <a href="schedule.html">出勤管理</a>
    <a href="#">お知らせ</a>
    <a href="#">ギャラリー</a>
    <a href="login.html">ログアウト</a>
</div>

<div class="main">

    <h1>管理ダッシュボード</h1>

    <a href="ranking.html">
  <button>
    ランキングを見る
  </button>
</a>

    <div class="cards">

        <div class="card">
            <h3>予約件数</h3>
            <p id="reservationCount">0件</p>
        </div>

        <div class="card">
  <h3>指名ランキング TOP10</h3>

  <div id="rankingList">
    読み込み中...
  </div>
</div>

        <div class="card">

    <h3>お知らせ</h3>

    <div class="news-admin">

        <input
            type="text"
            id="newsTitle"
            placeholder="タイトル"
        >

        <textarea
            id="newsText"
            placeholder="内容"
        ></textarea>

        <button id="saveNews">
            お知らせ追加
        </button>

    </div>

    <div id="newsList"></div>

</div>

        <div class="card">
            <h3>売上</h3>
            <p>¥0</p>
        </div>

        <div class="card">
    <h3>予約中</h3>
    <p id="countPending">0件</p>
</div>

<div class="card">
    <h3>確定</h3>
    <p id="countConfirmed">0件</p>
</div>

<div class="card">
    <h3>来店済</h3>
    <p id="countVisited">0件</p>
</div>

<div class="card">
    <h3>キャンセル</h3>
    <p id="countCanceled">0件</p>
</div>

    </div>

    <div class="filter-buttons">

  <button id="todayBtn">今日</button>

  <button id="allBtn">全件</button>

</div>

<input
  type="text"
  id="searchReservation"
  placeholder="名前・電話番号で検索"
  style="
    width:300px;
    padding:10px;
    margin-bottom:15px;
  "
>

    <h2>予約一覧</h2>

    <div id="reservationList"></div>

</div>

<script type="module" src="../assets/app.js"></script>

</body>
