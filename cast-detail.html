<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAST | Chou Chou</title>

<link rel="stylesheet" href="assets/css/style.css?v=6.0.0">

</head>

<body class="cast-detail-page">

<main class="cast-detail">
  <div class="cast-detail-heading">
    <p class="profile-label">Cast Profile</p>
    <h1 id="castName"></h1>
  </div>

  <div class="cast-detail-layout">
    <section class="cast-gallery" aria-label="キャスト写真">
      <div class="cast-photo-frame">
        <img id="castImage" class="cast-main-image" alt="">
      </div>
      <div id="castThumbnails" class="cast-thumbnails"></div>
    </section>

    <section class="profile-box">
      <div class="profile-card-head">
        <p class="profile-label">Luxury Profile</p>
        <h2>プロフィール</h2>
      </div>

      <div class="profile-grid">
        <p id="castAge"></p>
        <p id="castHeight"></p>
        <p id="castBloodType"></p>
        <p id="castBirthday"></p>
        <p id="castHobby"></p>
        <p id="castDrink"></p>
      </div>

      <p id="castMessage" class="profile-message"></p>

      <div id="castTags" class="cast-tags"></div>
      <div id="castSns" class="cast-sns"></div>

      <div class="cast-reserve-actions" aria-label="予約">
        <a href="reservation.html" class="reserve-btn cast-web-reserve">WEB予約</a>
        <a href="#" class="reserve-btn cast-line-reserve">LINE予約</a>
      </div>
    </section>
  </div>

</main>

<script type="module" src="assets/cast-detail.js?v=5.7.7"></script>

</body>
</html>
