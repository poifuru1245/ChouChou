<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAST | Chou Chou</title>

<link rel="stylesheet" href="assets/css/style.css?v=5.6.1">

</head>

<body class="cast-detail-page">

<main class="cast-detail">

  <section class="cast-gallery" aria-label="キャスト写真">
    <img id="castImage" class="cast-main-image" alt="">
    <div id="castThumbnails" class="cast-thumbnails"></div>
  </section>

  <section class="profile-box">
    <p class="profile-label">Cast Profile</p>
    <h1 id="castName"></h1>

    <div class="profile-grid">
      <p id="castAge"></p>
      <p id="castHeight"></p>
      <p id="castBirthday"></p>
      <p id="castBloodType"></p>
      <p id="castHobby"></p>
      <p id="castDrink"></p>
    </div>

    <p id="castMessage" class="profile-message"></p>

    <div id="castTags" class="cast-tags"></div>
    <div id="castSns" class="cast-sns"></div>

    <a href="reservation.html" class="reserve-btn">
      指名予約する
    </a>
  </section>

</main>

<script type="module" src="assets/cast-detail.js"></script>

</body>
</html>
